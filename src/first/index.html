<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/png" href="/favicon.png" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../public/style.css">
    <title>2차원 충돌 시뮬레이션</title>
</head>

<body>
    <canvas id="canvas"></canvas>

    <span>물체1을 움직여 물체2에 충돌시킨다고 가정함.</span>
    <span>물체 간 충돌 시, 물체1이 강제로 정지한다고 임의로 가정함.</span>

    <div>
        <label for="object1_m">물체1의 질량:</label>
        <input type="number" id="object1_m" value="1">

        <label for="object1_v">물체1의 속도:</label>
        <span type="number" id="object1_v" value="0"></span>

        <label for="object1_P">물체1의 운동량:</label>
        <span type="number" id="object1_p" value="0"></span>
    </div>

    <div>
        <label for="object2_m">물체2의 질량:</label>
        <input type="number" id="object2_m" value="1">

        <label for="object2_v">물체2의 속도:</label>
        <span type="number" id="object2_v" value="0"></span>

        <label for="object2_P">물체2의 운동량:</label>
        <span type="number" id="object2_p" value="0"></span>
    </div>

    <div>
        <label for="object_I">물체2가 받은 충격량:</label>
        <span type="number" id="object_I" value="0"> </span>
    </div>

    <button id="reset_btn">초기화</button>

    <script type="module" src="./main.ts"></script>
</body>

</html>
